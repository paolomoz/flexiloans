version: 1

indices:
  default:
    include:
      - '/**'
    exclude:
      - '/drafts/**'
      - '/blog/**'
      - '/hi/**'
    target: /query-index.json
    properties:
      title:
        select: head > meta[property="og:title"]
        value: attribute(el, 'content')
      description:
        select: head > meta[name="description"]
        value: attribute(el, 'content')
      category:
        select: head > meta[name="category"]
        value: attribute(el, 'content')
      published-time:
        select: head > meta[name="published-time"]
        value: attribute(el, 'content')
      lastModified:
        select: none
        value: parseTimestamp(headers['last-modified'], 'ddd, DD MMM YYYY hh:mm:ss GMT')

  blog:
    include:
      - '/blog/**'
    target: /blog-index.json
    properties:
      title:
        select: head > meta[property="og:title"]
        value: attribute(el, 'content')
      description:
        select: head > meta[name="description"]
        value: attribute(el, 'content')
      category:
        select: head > meta[name="category"]
        value: attribute(el, 'content')
      published-time:
        select: head > meta[name="published-time"]
        value: attribute(el, 'content')
      lastModified:
        select: none
        value: parseTimestamp(headers['last-modified'], 'ddd, DD MMM YYYY hh:mm:ss GMT')

  hindi:
    include:
      - '/hi/**'
    target: /hi-index.json
    properties:
      title:
        select: head > meta[property="og:title"]
        value: attribute(el, 'content')
      description:
        select: head > meta[name="description"]
        value: attribute(el, 'content')
      category:
        select: head > meta[name="category"]
        value: attribute(el, 'content')
      published-time:
        select: head > meta[name="published-time"]
        value: attribute(el, 'content')
      lastModified:
        select: none
        value: parseTimestamp(headers['last-modified'], 'ddd, DD MMM YYYY hh:mm:ss GMT')
